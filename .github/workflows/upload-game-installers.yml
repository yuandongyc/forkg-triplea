name: Package and Upload Game JAR
on:
  workflow_dispatch:
env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  build:
    runs-on: Ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Set build version
        run: |
          BUILD_VERSION=$(game-app/run/.build/get-build-version)
          echo "build_version=$BUILD_VERSION" | tee -a $GITHUB_ENV
          echo "release_name=$(date +%Y-%B-%d) - $BUILD_VERSION" | tee -a $GITHUB_ENV
      - name: Build Shadow JAR
        run: ./gradlew :game-headed:shadowJar
      - name: Create Github Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: game-app/game-headed/build/libs/*.jar
          tag: ${{ env.build_version }}
          name: ${{ env.release_name }}
          prerelease: true
          commit: ${{ github.sha }}
          token: ${{ secrets.GITHUB_TOKEN }}
